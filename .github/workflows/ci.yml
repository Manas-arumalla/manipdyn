name: manipdyn CI

on:
  push:
    paths:
      - "manipdyn/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "manipdyn/**"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Run everything inside the package dir: the repo-root `code/` folder
        # shadows Python's stdlib `code` module, which breaks tooling at root.
        working-directory: manipdyn
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install headless OpenGL for MuJoCo
        # libgl1-mesa-glx was removed in Ubuntu 24.04 (ubuntu-latest); use the
        # current package names. OSMesa is what MuJoCo renders through here.
        run: sudo apt-get update && sudo apt-get install -y libosmesa6 libgl1 libglx-mesa0 libglfw3

      - name: Install package (with dev tools)
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Format check (ruff format)
        run: ruff format --check src tests

      - name: Tests (headless rendering via OSMesa)
        env:
          MUJOCO_GL: osmesa
        run: pytest -q
